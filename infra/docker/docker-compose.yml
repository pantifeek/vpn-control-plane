services:
  manager-api:
    image: vpn-manager-api:local
    build:
      context: ../..
      dockerfile: apps/manager-api/Dockerfile
    container_name: vpn-manager-api
    environment:
      PORT: 3001
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      PROFILE_STORE_PATH: /data/profiles.json
      PANEL_AUTH_USERNAME: ${PANEL_AUTH_USERNAME:-}
      PANEL_AUTH_PASSWORD: ${PANEL_AUTH_PASSWORD:-}
      PANEL_AUTH_SECRET: ${PANEL_AUTH_SECRET:-}
      MONITORING_TOKEN: ${MONITORING_TOKEN:-}
      RUNTIME_NETWORK: vpn-runtime-plane
      RUNTIME_PORT: 8080
      RUNTIME_IMAGE_OPENVPN: vpn-runtime-openvpn:local
      RUNTIME_IMAGE_IPSEC: vpn-runtime-ipsec:local
      RUNTIME_IMAGE_IPSEC_B: vpn-runtime-ipsec-b:local
      RUNTIME_IMAGE_WIREGUARD: vpn-runtime-wireguard:local
      RUNTIME_IPSEC_INTERFACE_MISSING_GRACE_MS: ${RUNTIME_IPSEC_INTERFACE_MISSING_GRACE_MS:-300000}
      RUNTIME_IPSEC_KEEPALIVE_ENABLED: ${RUNTIME_IPSEC_KEEPALIVE_ENABLED:-true}
      RUNTIME_IPSEC_KEEPALIVE_INTERVAL_MS: ${RUNTIME_IPSEC_KEEPALIVE_INTERVAL_MS:-20000}
      RUNTIME_IPSEC_KEEPALIVE_TIMEOUT_MS: ${RUNTIME_IPSEC_KEEPALIVE_TIMEOUT_MS:-3000}
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - manager-api-data:/data
    networks:
      - manager-plane
      - runtime-plane
    restart: unless-stopped

  manager-web:
    image: vpn-manager-web:local
    build:
      context: ../..
      dockerfile: apps/manager-web/Dockerfile
    container_name: vpn-manager-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      PANEL_AUTH_USERNAME: ${PANEL_AUTH_USERNAME:-}
      PANEL_AUTH_PASSWORD: ${PANEL_AUTH_PASSWORD:-}
      PANEL_AUTH_SECRET: ${PANEL_AUTH_SECRET:-}    
    ports:
      - "3000:3000"
    depends_on:
      - manager-api
    networks:
      - manager-plane
    restart: unless-stopped

  vpn-runtime-openvpn:
    image: vpn-runtime-openvpn:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/openvpn.Dockerfile
    profiles:
      - runtime-images

  vpn-runtime-ipsec:
    image: vpn-runtime-ipsec:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/ipsec.Dockerfile
    profiles:
      - runtime-images

  vpn-runtime-ipsec-b:
    image: vpn-runtime-ipsec-b:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/ipsec-b.Dockerfile
    profiles:
      - runtime-images

  vpn-runtime-wireguard:
    image: vpn-runtime-wireguard:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/wireguard.Dockerfile
    profiles:
      - runtime-images

networks:
  manager-plane:
    name: vpn-manager-plane
  runtime-plane:
    name: vpn-runtime-plane
    internal: true

volumes:
  manager-api-data:
