services:
  manager-api:
    image: vpn-manager-api:local
    build:
      context: ../..
      dockerfile: apps/manager-api/Dockerfile
    container_name: vpn-manager-api
    environment:
      PORT: 3001
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      PROFILE_STORE_PATH: /data/profiles.json
      RUNTIME_NETWORK: vpn-control-plane
      RUNTIME_PORT: 8080
      RUNTIME_IMAGE_OPENVPN: vpn-runtime-openvpn:local
      RUNTIME_IMAGE_IPSEC: vpn-runtime-ipsec:local
      RUNTIME_IMAGE_WIREGUARD: vpn-runtime-wireguard:local
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - manager-api-data:/data
    networks:
      - control-plane
    restart: unless-stopped

  manager-web:
    image: vpn-manager-web:local
    build:
      context: ../..
      dockerfile: apps/manager-web/Dockerfile
    container_name: vpn-manager-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - manager-api
    networks:
      - control-plane
    restart: unless-stopped

  vpn-runtime-openvpn:
    image: vpn-runtime-openvpn:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/openvpn.Dockerfile
    profiles:
      - runtime-images

  vpn-runtime-ipsec:
    image: vpn-runtime-ipsec:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/ipsec.Dockerfile
    profiles:
      - runtime-images

  vpn-runtime-wireguard:
    image: vpn-runtime-wireguard:local
    build:
      context: ../..
      dockerfile: infra/docker/runtime/wireguard.Dockerfile
    profiles:
      - runtime-images

networks:
  control-plane:
    name: vpn-control-plane

volumes:
  manager-api-data:
